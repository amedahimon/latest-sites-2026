        const grid = document.getElementById('sitesGrid');

        function renderSites(filteredSites) {
            grid.innerHTML = '';
            if (filteredSites.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-secondary); padding: 3rem 0;">没有找到符合搜索条件的站点</div>';
                return;
            }
            
            // To render 1550 items extremely fast, we build a document fragment
            const fragment = document.createDocumentFragment();
            filteredSites.forEach(site => {
                const a = document.createElement('a');
                a.className = 'card';
                a.href = site.url;
                a.target = '_blank';
                a.rel = 'noopener noreferrer';
                
                const title = document.createElement('div');
                title.className = 'card-title';
                title.textContent = site.name;
                
                const url = document.createElement('div');
                url.className = 'card-url';
                url.textContent = site.url.replace(/^https?:\/\//, '');
                
                a.appendChild(title);
                a.appendChild(url);
                fragment.appendChild(a);
            });
            grid.appendChild(fragment);
        }

        // Search mechanism
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = sites.filter(site => 
                site.name.toLowerCase().includes(query) || 
                site.url.toLowerCase().includes(query)
            );
            renderSites(filtered);
            searchCount.textContent = `找到 ${filtered.length} 个`;
        });

        // Initial render
        renderSites(sites);
